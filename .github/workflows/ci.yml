name: CI Pipeline

# Specify the events that trigger the workflow
on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'src/backend/**'
              - '.github/workflows/**'
            frontend:
              - 'src/frontend/**'
              - '.github/workflows/**'

  backend-ci:
    name: Backend (Python)
    # Only run on PRs when backend files changed
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.backend == 'true'
    needs: [detect-changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Type checking (MyPy)
        run: mypy .
        # Using the configuration from pyproject.toml

      - name: Run Unit Tests (Logic & Schemas)
        run: pytest .
        # Using the configuration from pyproject.toml

  frontend-ci:
    name: Frontend (React)
    # Only run on PRs when frontend files changed
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.frontend == 'true'
    needs: [detect-changes]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Linting (ESLint)
        run: npm run lint

      - name: Type Check & Build
        run: npm run check

  deploy-render:
    name: Deploy (Render)
    runs-on: ubuntu-latest
    # Only runs on direct pushes/merges to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy (Backend)
        shell: bash
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [[ -z "${RENDER_DEPLOY_HOOK_URL}" ]]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK_URL not set; skipping backend deploy trigger."
            exit 0
          fi
          curl -fsSL -X POST "${RENDER_DEPLOY_HOOK_URL}"

      - name: Trigger Render deploy (Frontend)
        shell: bash
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [[ -z "${RENDER_DEPLOY_HOOK_URL}" ]]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK_URL not set; skipping frontend deploy trigger."
            exit 0
          fi
          curl -fsSL -X POST "${RENDER_DEPLOY_HOOK_URL}"
